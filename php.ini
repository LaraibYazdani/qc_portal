; PHP settings for Vercel deployment
; Vercel always serves over HTTPS so secure cookie flags are safe to enable.

[Session]
session.use_strict_mode  = 1
session.cookie_secure    = 1
session.cookie_httponly  = 1
session.cookie_samesite  = "Lax"

[PHP]
; Raise memory limit slightly to accommodate GD image operations
memory_limit = 128M
